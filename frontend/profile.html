<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Quiz App</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .profile-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      border-radius: 10px;
      margin-bottom: 40px;
    }
    .profile-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .profile-item {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .profile-item-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .profile-item-value {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #e0e0e0;
    }
    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #667eea;
    }
    .subject-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }
    .subject-stat {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid #764ba2;
      font-size: 14px;
    }
    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .results-table thead {
      background: #f8f9fa;
    }
    .results-table th,
    .results-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    .results-table th {
      font-weight: 600;
      color: #333;
    }
    .results-table tr:hover {
      background: #f8f9fa;
    }
    .btn-back {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-back:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <span class="header-logo">QUIZ APP</span>
    <div class="header-right">
      <div class="profile-wrap">
        <button class="profile-icon-btn" id="profile-btn" title="Account">U</button>
        <div class="profile-dropdown" id="profile-dropdown">
          <button class="dropdown-item" id="profile-page-btn">Profile</button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" id="logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <div class="page-body">
    <div class="profile-container">
      <a href="index.html" class="btn-back">← Back to Home</a>

      <div class="profile-header">
        <h1>Your Profile</h1>
        <p>Track your quiz performance and statistics</p>
      </div>

      <div class="profile-info">
        <div class="profile-item">
          <div class="profile-item-label">Username</div>
          <div class="profile-item-value" id="username-display">—</div>
        </div>
        <div class="profile-item">
          <div class="profile-item-label">Email</div>
          <div class="profile-item-value" id="email-display">—</div>
        </div>
        <div class="profile-item">
          <div class="profile-item-label">Member Since</div>
          <div class="profile-item-value" id="joined-display">—</div>
        </div>
      </div>

      <h2>Statistics</h2>
      <div id="stats-container">Loading...</div>

      <h2 style="margin-top: 40px;">Recent Attempts</h2>
      <div id="results-container">Loading...</div>
    </div>
  </div>

  <script src="utils/helpers.js"></script>
  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
  <script>
    document.getElementById('profile-btn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('profile-dropdown').classList.toggle('open');
    });
    document.addEventListener('click', function () {
      document.getElementById('profile-dropdown').classList.remove('open');
    });
    document.getElementById('logout-btn').addEventListener('click', function () {
      removeToken();
      redirectTo('login.html');
    });
  </script>
</body>
</html>
